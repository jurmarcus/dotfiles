# =============================================================================
# Tmux Configuration - Catppuccin Frappe theme
# =============================================================================

# Prefix: Ctrl+a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# =============================================================================
# General Settings
# =============================================================================

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
# Escape time: higher for mosh (mosh buffers input)
if-shell '[ -n "$MOSH_CONNECTION" ]' 'set -g escape-time 50' 'set -g escape-time 10'
set -g focus-events on
set -g status-interval 5

# Clipboard: OSC 52 support (works over SSH)
set -s set-clipboard on
set -g allow-passthrough on

# =============================================================================
# Key Bindings
# =============================================================================

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# Pane splitting (more intuitive)
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation
bind -r C-h previous-window
bind -r C-l next-window

# Window reordering (move window left/right)
bind -r S-Left swap-window -d -t -1
bind -r S-Right swap-window -d -t +1

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Kill pane/window
bind x kill-pane
bind X kill-window

# Detach
bind d detach-client

# Session management
bind w choose-tree -Zs

# =============================================================================
# Copy Mode (vi-style) - OSC 52 for SSH clipboard support
# =============================================================================

setw -g mode-keys vi
bind [ copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "#{HOME}/.local/bin/osc52-copy"
bind -T copy-mode-vi Escape send -X cancel

# Mouse selection copies to clipboard via OSC 52
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "#{HOME}/.local/bin/osc52-copy"

# =============================================================================
# Status Bar - Catppuccin Frappe
# =============================================================================

# Catppuccin Frappe palette reference:
#   rosewater=#f2d5cf  flamingo=#eebebe  pink=#f4b8e4     mauve=#ca9ee6
#   red=#e78284        maroon=#ea999c    peach=#ef9f76     yellow=#e5c890
#   green=#a6d189      teal=#81c8be      sky=#99d1db       sapphire=#85c1dc
#   blue=#8caaee       lavender=#babbf1  text=#c6d0f5      subtext1=#b5bfe2
#   subtext0=#a5adce   overlay2=#949cbb  overlay1=#838ba7  overlay0=#737994
#   surface2=#626880   surface1=#51576d  surface0=#414559  base=#303446
#   mantle=#292c3c     crust=#232634

# Status bar
set -g status-position bottom
set -g status-style "bg=#303446,fg=#c6d0f5"
set -g status-left-length 100
set -g status-right-length 100

# Left: session name (green when prefix active, blue otherwise)
set -g status-left "#{?client_prefix,#[bg=#a6d189],#[bg=#8caaee]}#[fg=#303446,bold] #S #[bg=#303446] "

# Right: zoom indicator, date, time, host
set -g status-right "#{?window_zoomed_flag,#[fg=#f4b8e4][ zoomed ] ,}#[fg=#a5adce]%Y-%m-%d #[fg=#c6d0f5]%H:%M #[bg=#8caaee,fg=#303446,bold] #h "

# Window status
set -g window-status-format "#[fg=#a5adce] #I:#W "
set -g window-status-current-format "#[bg=#414559,fg=#c6d0f5,bold] #I:#W "
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#414559"
set -g pane-active-border-style "fg=#8caaee"

# Message style
set -g message-style "bg=#414559,fg=#c6d0f5"
