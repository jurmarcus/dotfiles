[ui]
merge = nvimdiff
username = Jurmarcus <me@jurmarcus.com>
allowemptycommit = true
# Global ignore file — mirror of ~/.config/git/ignore.
# Covers .DS_Store, IDE state, editor swap files, language caches, etc.
ignore = ~/.config/sapling/ignore

[merge-tools]
nvimdiff.executable = nvim
nvimdiff.args = -d $local $base $other -c 'wincmd J' -c 'wincmd ='
nvimdiff.premerge = keep
nvimdiff.check = changed

[alias]
# Parallel-work primitives from ezyang's parallel-agents-with-sapling pattern.
# follow: chase the obsmarker chain to the live successor of `.`
# adopt:  rebase any newly-inserted children of our parent onto `.`
follow = goto last(successors(.))
adopt = rebase -s 'children(parents(.)) - .' -d .

[extensions]
# share: enables `sl share` for parallel working dirs sharing one store.
#        Works in .sl mode. Broken in .git mode (upstream bug — see Plan B).
share =
# absorb: line-aware amend. Edit lines, run `sl absorb`, sapling figures out
#         which commit in the stack introduced each line and amends them.
absorb =

[smartlog]
# Show remote bookmark names on landed commits in smartlog output.
names = true
