# Folder definitions for Syncthing claude memory sync.
# Read by ~/dotfiles/bootstrap/syncthing.sh.
#
# Format: <folder-id> <local-path> <label> <stignore-template>
# - folder-id:        unique within syncthing config; lowercase, hyphens
# - local-path:       absolute path; $HOME is expanded
# - label:            quoted, human-readable, may contain spaces
# - stignore-template: filename in ~/.config/claude-sync/stignore/
#                     ("none" = no .stignore deployed)
#
# Lines starting with '#' or blank lines are ignored.
# All folders use Send & Receive, fsWatcher: true, simple/5 versioning.

claude-mem-global    $HOME/.claude/memory      "Claude Memory (Global)"    claude-memory
claude-mem-projects  $HOME/.claude/projects    "Claude Memory (Projects)"  claude-projects

# Future folders (uncomment to enable, then run claude-sync-add-folder):
# claude-plans       $HOME/Notes/plans/claude-personal  "Claude Plans"  claude-plans
